name: Deploy to cPanel

on:
  push:
    branches:
      - main  # Trigger on every push to main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_TAWK_PROPERTY_ID: ${{ secrets.VITE_TAWK_PROPERTY_ID }}
          VITE_TAWK_WIDGET_ID: ${{ secrets.VITE_TAWK_WIDGET_ID }}
          
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ./  # This goes into public_html because of your FTP setup